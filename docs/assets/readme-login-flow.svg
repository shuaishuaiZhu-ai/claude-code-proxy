<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="420" viewBox="0 0 1160 420" role="img" aria-labelledby="title desc">
  <title id="title">ChatGPT subscription login modes</title>
  <desc id="desc">The default device-code login avoids browser callback failures on localhost 1455.</desc>
  <defs>
    <linearGradient id="good" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7fff8"/>
      <stop offset="1" stop-color="#d6f4ff"/>
    </linearGradient>
    <style>
      .title{font:800 32px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102027}
      .head{font:800 21px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102027}
      .body{font:500 16px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#526672}
      .code{font:700 15px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#102027}
      .box{rx:18;stroke:#bfd1d8;stroke-width:1.2}
      .arrow{stroke:#25a18e;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .old{stroke:#d0a04d;stroke-width:2;fill:#fff8e6}
    </style>
  </defs>
  <rect width="1160" height="420" rx="28" fill="#f6f8fa"/>
  <text x="54" y="66" class="title">ChatGPT subscription login: default path is device-code</text>

  <rect x="56" y="108" width="270" height="190" class="box" fill="url(#good)"/>
  <text x="88" y="153" class="head">1. ccproxy prints code</text>
  <text x="88" y="190" class="body">Open the verification URL in any browser.</text>
  <rect x="88" y="218" width="194" height="42" rx="10" fill="#ffffff" stroke="#b7c8cf"/>
  <text x="106" y="245" class="code">ABCD-1234</text>

  <path d="M336 202 H438" class="arrow"/>
  <path d="M424 188 L442 202 L424 216" class="arrow"/>

  <rect x="456" y="108" width="270" height="190" class="box" fill="url(#good)"/>
  <text x="488" y="153" class="head">2. OpenAI confirms</text>
  <text x="488" y="190" class="body">No localhost callback. No fixed port.</text>
  <text x="488" y="226" class="body">Works across Windows, macOS, WSL, Linux.</text>

  <path d="M736 202 H838" class="arrow"/>
  <path d="M824 188 L842 202 L824 216" class="arrow"/>

  <rect x="856" y="108" width="250" height="190" class="box" fill="url(#good)"/>
  <text x="888" y="153" class="head">3. auth2api token</text>
  <text x="888" y="190" class="body">Stored under ~/.ccproxy.</text>
  <text x="888" y="226" class="body">Then ccproxy starts the local adapter.</text>

  <rect x="56" y="326" width="1050" height="54" rx="16" class="old"/>
  <text x="88" y="360" class="body">Legacy browser callback is still available with --browser-login, but it can hang on consent pages or collide on localhost:1455.</text>
</svg>
